
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>米卷商城｜QQ帳號、微信帳號、KOOK帳號專賣</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #fefcf9;
      color: #5b5b5b;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    header {
      background-color: #ffffff;
      padding: 16px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 10;
      animation: slideDown 0.5s ease-out both;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: #334155;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .logo:hover {
      transform: scale(1.05);
      color: #f59e0b;
    }

    .hero {
      background: linear-gradient(to right, #fff9e6, #fff);
      padding: 100px 20px 80px;
      text-align: center;
      color: #1f2937;
      animation: fadeIn 0.8s ease-in-out;
    }
    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 1.2rem;
      color: #64748b;
    }

    .section {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
    }
    .section h2 {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 40px;
      color: #1e293b;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .product {
      background-color: #ffffff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .product h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: #1d4ed8;
    }
    .product p {
      font-size: 0.95rem;
      color: #4b5563;
      margin-bottom: 16px;
    }
    .buy-button {
      background-color: #fbbf24;
      color: #1f2937;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
      display: inline-block;
      margin-top: auto;
    }
    .buy-button:hover {
      background-color: #f59e0b;
      transform: scale(1.05);
    }

    .contacts {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
    }
    .contact-item {
      width: 100px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .contact-item:hover {
      transform: translateY(-5px);
    }
    .contact-item img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      margin-bottom: 8px;
      object-fit: cover;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .contact-item span {
      font-size: 0.9rem;
      display: block;
    }

    footer {
      background-color: #fafafa;
      text-align: center;
      padding: 20px 16px;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }
      .section h2 {
        font-size: 1.5rem;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(-100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <a id="top"></a>
  <header>
    <a href="#top" class="logo">米卷商城</a>
  </header>

  <section class="hero">
    <h1>虛擬商品．安心即買</h1>
    <p>品質保證，快速出貨</p>
  </section>

  <section class="section" id="products">
    <h2>熱門虛擬商品</h2>
    <div class="products">
      <div class="product">
        <h3>QQ帳號</h3>
        <p>綁定台灣手機號</p>
        <a href="https://www.8591.com.tw/v3/mall/detail/2405955350" class="buy-button">立即購買</a>
      </div>
      <div class="product">
        <h3>微信帳號</h3>
        <p>現成微信號與掃碼驗證</p>
        <a href="https://www.8591.com.tw/v3/mall/detail/2410106195" class="buy-button">立即購買</a>
      </div>
      <div class="product">
        <h3>KOOK帳號</h3>
        <p>綁定台灣手機號，可語音/聊天/加頻道/</p>
        <a href="https://www.8591.com.tw/v3/mall/detail/2412857851" class="buy-button">立即購買</a>
      </div>
    </div>
  </section>

  <section class="section" id="contact">
    <h2>聯絡我們</h2>
    <div class="contacts">
      <a href="使用者名稱：peregrine666>
        <img src="discord.png" alt="Discord">
        <span>Discord</span>
      </a>
      <a href="https://www.8591.com.tw/v3/mall/list/seller-3242227?module=mallList&action=list&uid=3242227" class="contact-item" target="_blank">
        <img src="unnamed.png" alt="8591">
        <span>8591</span>
      </a>
      <a href="https://page.line.me/410veacp" class="contact-item" target="_blank">
        <img src="LINE.jpeg" alt="LINE">
        <span>LINE</span>
      </a>
    </div>
  </section>

  <footer>
    &copy; 2026 米卷商城 版權所有
  </footer>
</body>
</html>
